<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <title>Multiple Choice Form Uploader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
</head>

<body class="bg-gray-50 text-gray-800">

  <!-- Navbar -->
  <nav class="w-full bg-white shadow-md fixed top-0 left-0 z-50">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center h-16">
      <div class="flex items-center space-x-2">
        <img src="https://www.vanvatcorp.com/public-res/logo-512.jpg" class="h-10 w-10" alt="logo">
        <span class="font-bold text-xl text-blue-700">Form Uploader</span>
      </div>
    </div>
  </nav>

  <!-- Question Builder Section -->
  <section aria-label="Multiple Choice Builder" class="max-w-7xl mx-auto px-6 sm:px-8 lg:px-12 py-20">
    <h2 class="text-3xl font-bold text-center text-gray-900 mb-12">🧠 Multiple Choice Builder</h2>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <!-- Left: Question Editor -->
      <div id="question-editor" class="space-y-4">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-xl font-semibold text-gray-800">Question Editor</h3>
          <button id="add-question" class="bg-blue-700 text-white px-4 py-2 rounded-md hover:bg-blue-800 transition">
            ➕ Add Question
          </button>
        </div>
        <div id="questions-container" class="space-y-6"></div>
      </div>

      <!-- Right: JSON Editor -->
      <div>
        <h3 class="text-xl font-semibold text-gray-800 mb-2">Live JSON</h3>
        <textarea id="json-editor"
          class="w-full h-[600px] p-4 border rounded-lg font-mono text-sm focus:ring-2 focus:ring-blue-700 outline-none"></textarea>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-blue-900 text-blue-200 py-8 mt-20">
    <div class="max-w-7xl mx-auto px-6 sm:px-8 lg:px-12 flex flex-col md:flex-row justify-between items-center">
      <p class="text-sm">
        © 2026 Tập đoàn Vạn Vật. All rights reserved.
      </p>
      <div class="flex space-x-6 mt-4 md:mt-0">
        <a aria-label="Privacy Policy" class="hover:text-white" href="https://www.vanvatcorp.com/privacy-policy">
          Privacy Policy
        </a>
        <a aria-label="Terms of Service" class="hover:text-white" href="https://www.vanvatcorp.com/terms-of-service">
          Terms of Service
        </a>
        <a aria-label="Sitemap" class="hover:text-white" href="/van-vat-corporation/sitemap/">
          Sitemap
        </a>
      </div>
    </div>
  </footer>

  <!-- Script -->
  <script
    src="https://academy.vanvatcorp.com/active-learning/multiple-choice-learning/create-test/testCreationHandler.js"></script>

  <!-- Dynamic Auth Navbar - will be populated by auth-navbar.js -->
  <div class="hidden md:flex" id="auth-navbar-placeholder">
    <!-- Auth navbar will be inserted here dynamically -->
</body>

</html>
