<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Active Learning Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-800">

  <!-- Navbar -->
  <nav class="w-full bg-white shadow fixed top-0 left-0 z-50">
    <div class="max-w-6xl mx-auto px-6 flex justify-between items-center h-16">
      <div class="flex items-center space-x-2">
        <img src="https://www.vanvatcorp.com/public-res/logo-512.jpg" class="h-10 w-10" alt="logo">
        <span class="font-bold text-xl text-blue-700">Active Learning Test</span>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="pt-24 max-w-4xl mx-auto px-4 pb-20">
    <h1 id="testTitle" class="text-3xl font-bold mb-8 text-center">Loading...</h1>
    <button onclick="location.href='https://donate.vanvatcorp.com/donate/method';"
      class="relative group bg-gradient-to-r from-blue-600 to-blue-800 text-white px-6 py-3 rounded-lg font-semibold overflow-hidden transition-all duration-300 shadow-lg mb-4">
      <span class="relative z-10">💖 Đóng góp duy trì (Donate)</span>
      <div
        class="absolute inset-0 bg-gradient-to-r from-blue-400 to-blue-600 opacity-0 group-hover:opacity-100 blur-lg transition-opacity duration-500">
      </div>
      <div class="absolute inset-0 border border-blue-300 opacity-0 group-hover:opacity-100 rounded-lg animate-pulse">
      </div>
    </button>

    <div id="questionsContainer" class="space-y-8"></div>

    <div class="mt-10 flex justify-center">
      <button id="submitBtn" onclick="submitAnswers()"
        class="bg-blue-700 text-white px-6 py-3 rounded-lg hover:bg-blue-800 font-semibold">
        Submit
      </button>
    </div>

    <!-- Result Box -->
    <div id="resultBox" class="hidden mt-10 p-6 bg-white rounded-lg shadow border text-center">
      <h2 class="text-2xl font-bold mb-4">🎯 Your Result</h2>
      <p class="text-lg mb-2"><strong>Total Questions:</strong> <span id="totalQ"></span></p>
      <p class="text-lg mb-2"><strong>Correct:</strong> <span id="correctQ"></span></p>
      <p class="text-lg mb-2"><strong>Score:</strong> <span id="score"></span>%</p>
      <div id="message" class="mt-3 font-semibold text-blue-700"></div>
    </div>
  </main>
  <!-- Footer -->
  <footer class="bg-blue-900 text-blue-200 py-8 mt-20">
    <div class="max-w-7xl mx-auto px-6 sm:px-8 lg:px-12 flex flex-col md:flex-row justify-between items-center">
      <p class="text-sm">
        © 2026 Tập đoàn Vạn Vật. All rights reserved.
      </p>
      <div class="flex space-x-6 mt-4 md:mt-0">
        <a aria-label="Privacy Policy" class="hover:text-white" href="https://www.vanvatcorp.com/privacy-policy">
          Privacy Policy
        </a>
        <a aria-label="Terms of Service" class="hover:text-white" href="https://www.vanvatcorp.com/terms-of-service">
          Terms of Service
        </a>
        <a aria-label="Sitemap" class="hover:text-white" href="/van-vat-corporation/sitemap/">
          Sitemap
        </a>
      </div>
    </div>
  </footer>


  <script src="https://academy.vanvatcorp.com/active-learning/multiple-choice-learning/scripts/utils.js"></script>

  <script
    src="https://academy.vanvatcorp.com/active-learning/multiple-choice-learning/start-learning/testHandler.js"></script>

  <!-- Dynamic Auth Navbar - will be populated by auth-navbar.js -->
  <div class="hidden md:flex" id="auth-navbar-placeholder">
    <!-- Auth navbar will be inserted here dynamically -->
</body>

</html>
