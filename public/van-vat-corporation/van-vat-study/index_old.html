<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <title>
        PDF Viewer - Van Vat Study
    </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Make iframe fill container */
        .pdf-container iframe {
            width: 100%;
            height: 80vh;
            border: none;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body class="bg-white text-gray-800 font-inter">
    <!-- Navbar -->
    <nav class="w-full bg-white shadow-md fixed top-0 left-0 z-50">
        <div class="max-w-7xl mx-auto px-6 sm:px-8 lg:px-12">
            <div class="flex items-center justify-between h-16">
                <a class="flex items-center space-x-2" href="https://www.vanvatcorp.com/">
                    <img alt="Corporation logo, blue and white abstract geometric shape" class="h-10 w-10" height="40"
                        src="https://www.vanvatcorp.com/public-res/logo-512.jpg"
                        altSrc="https://storage.googleapis.com/a1aa/image/ff61740e-9851-4881-b7bc-0187d051ac31.jpg"
                        width="40" />
                    <span class="text-2xl font-bold text-blue-700">
                        Tập đoàn Vạn Vật
                    </span>
                </a>
                <div class="hidden md:flex space-x-8 font-semibold text-gray-700">
                    <a class="hover:text-blue-700 transition" href="https://services.vanvatcorp.com/">
                        Dịch vụ
                    </a>
                    <a class="hover:text-blue-700 transition" href="/van-vat-corporation/about-us/">
                        Về chúng tôi
                    </a>
                    <a class="hover:text-blue-700 transition" href="/van-vat-corporation/teams/">
                        Nhóm
                    </a>
                    <a class="hover:text-blue-700 transition" href="/van-vat-corporation/careers/">
                        Sự nghiệp
                    </a>
                    <a class="hover:text-blue-700 transition" href="/van-vat-corporation/contact-us/">
                        Liên hệ
                    </a>
                </div>
                <!-- Dynamic Auth Navbar - will be populated by auth-navbar.js -->
                <div class="hidden md:flex" id="auth-navbar-placeholder">
                    <!-- Auth navbar will be inserted here dynamically -->
                </div>
                <div class="md:hidden">
                    <button aria-label="Toggle menu"
                        class="text-gray-700 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-blue-700"
                        id="mobile-menu-button">
                        <i class="fas fa-bars fa-lg"></i>
                    </button>
                </div>
            </div>
        </div>
        <div class="md:hidden hidden bg-white border-t border-gray-200" id="mobile-menu">
            <a class="block px-6 py-3 text-gray-700 font-semibold hover:bg-blue-50"
                href="https://services.vanvatcorp.com/">
                Dịch vụ
            </a>
            <a class="block px-6 py-3 text-gray-700 font-semibold hover:bg-blue-50"
                href="/van-vat-corporation/about-us/">
                Về chúng tôi
            </a>
            <a class="block px-6 py-3 text-gray-700 font-semibold hover:bg-blue-50" href="/van-vat-corporation/teams/">
                Nhóm
            </a>
            <a class="block px-6 py-3 text-gray-700 font-semibold hover:bg-blue-50"
                href="/van-vat-corporation/careers/">
                Sự nghiệp
            </a>
            <a class="block px-6 py-3 text-gray-700 font-semibold hover:bg-blue-50"
                href="/van-vat-corporation/contact-us/">
                Liên hệ
            </a>
            <!-- Dynamic Auth Navbar Mobile - will be populated by auth-navbar.js -->
            <div id="auth-navbar-mobile-placeholder">
                <!-- Auth navbar mobile will be inserted here dynamically -->
            </div>
    </nav>
    <!-- PDF Viewer Section -->
    <main class="pt-24 max-w-7xl mx-auto px-6 sm:px-8 lg:px-12 py-12">
        <h1 class="text-3xl font-bold text-blue-700 mb-8">
            Vạn Vật <span><i><b>Học Tập</b></i></span>
        </h1>
        <div class="max-w-5xl mx-auto bg-white rounded-lg shadow-lg p-6 pdf-container">
            <div class="flex justify-between items-center mb-3">
                <p class="text-sm text-gray-600 font-semibold select-none">PDF file.pdf</p>
                <p class="text-sm text-gray-600 font-semibold select-none">37.5MB</p>
            </div>
            <iframe src="https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf"
                title="Sample PDF document showing a dummy text page with paragraphs and headings"
                aria-label="PDF document viewer"></iframe>
        </div>
        <div class="max-w-5xl mx-auto mt-6 flex items-center space-x-4">
            <input id="pdf-url" type="url" placeholder="https://example.com/document.pdf"
                class="flex-grow border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-700" />
            <button id="load-pdf"
                class="inline-block bg-blue-700 text-white font-semibold px-6 py-2 rounded-md hover:bg-blue-800 transition">
                Tải PDF
            </button>
        </div>
    </main>
    <!-- Footer -->
    <footer class="bg-blue-900 text-blue-200 py-8 mt-20">
        <div class="max-w-7xl mx-auto px-6 sm:px-8 lg:px-12 flex flex-col md:flex-row justify-between items-center">
            <p class="text-sm">
                © 2026 Tập đoàn Vạn Vật. All rights reserved.
            </p>
            <div class="flex space-x-6 mt-4 md:mt-0">
                <a aria-label="Privacy Policy" class="hover:text-white"
                    href="https://www.vanvatcorp.com/privacy-policy">
                    Privacy Policy
                </a>
                <a aria-label="Terms of Service" class="hover:text-white"
                    href="https://www.vanvatcorp.com/terms-of-service">
                    Terms of Service
                </a>
                <a aria-label="Sitemap" class="hover:text-white" href="#">
                    Sitemap
                </a>
            </div>
        </div>
    </footer>
    <script>
        const menuButton = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');

        menuButton.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });

        const loadPdfBtn = document.getElementById('load-pdf');
        const pdfUrlInput = document.getElementById('pdf-url');
        const iframe = document.querySelector('.pdf-container iframe');

        document.addEventListener('DOMContentLoaded', () => {
            updateInputsFromHash();
        });

        function updateInputsFromHash() {
            var hash = window.location.hash.substring(1); // Get the hash value without the #
            pdfUrlInput.value = hash;
            onTargetFolderChange();
            loadPdf();
        }

        function onTargetFolderChange() {
            window.location.hash = pdfUrlInput.value;
        }


        loadPdfBtn.addEventListener('click', () => {
            loadPdf();
        });

        function loadPdf() {
            const url = pdfUrlInput.value.trim();
            if (url) {
                // Basic validation for PDF URL
                if (url.toLowerCase().endsWith('.pdf')) {
                    iframe.src = url;
                } else {
                    alert('Please enter a valid PDF URL ending with .pdf');
                }
            } else {
                alert('Please enter a PDF URL');
            }
        }
    </script>
</body>

</html>
